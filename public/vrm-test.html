<!DOCTYPE html>
<html>
<head><title>VRM Test</title></head>
<body style="background:#1a1a2e;color:#fff;font-family:monospace">
<h3>VRM Loading Test</h3>
<div id="log"></div>
<canvas id="canvas" width="400" height="600" style="border:1px solid #444"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.1/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

const log = (msg) => {
  document.getElementById('log').innerHTML += msg + '<br>';
  console.log(msg);
};

log('Step 1: Setting up scene...');

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(400, 600);
renderer.setClearColor(0x1a1a2e, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(20, 400/600, 0.1, 20);
camera.position.set(0, 1.3, 2.5);
camera.lookAt(0, 1.2, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(1, 2, 3);
scene.add(dir);

log('Step 2: Scene ready. Loading VRM...');

// Get model path from settings
const settingsResp = await fetch('/api/settings');
const settings = await settingsResp.json();
const modelPath = settings.avatar?.modelPath;
log('Model path from settings: ' + modelPath);

if (!modelPath) {
  log('ERROR: No model path configured!');
} else {
  const url = '/api/assets/' + modelPath.replace(/^\//, '').split('/').map(s => encodeURIComponent(s)).join('/');
  log('Fetching URL: ' + url);

  // First test: can we fetch it at all?
  try {
    const testResp = await fetch(url, { method: 'HEAD' });
    log('HEAD request: status=' + testResp.status + ' content-type=' + testResp.headers.get('content-type') + ' size=' + testResp.headers.get('content-length'));
  } catch(e) {
    log('HEAD request failed: ' + e.message);
  }

  // Now try GLTFLoader
  const loader = new GLTFLoader();
  loader.register((parser) => new VRMLoaderPlugin(parser));

  loader.load(
    url,
    (gltf) => {
      log('Step 3: GLTF loaded!');
      const vrm = gltf.userData.vrm;
      log('VRM object: ' + (vrm ? 'YES' : 'NO'));
      if (vrm) {
        VRMUtils.removeUnnecessaryVertices(gltf.scene);
        VRMUtils.removeUnnecessaryJoints(gltf.scene);
        vrm.scene.rotation.y = Math.PI;
        scene.add(vrm.scene);
        log('VRM added to scene!');
        log('Has expressionManager: ' + !!vrm.expressionManager);
        log('Has humanoid: ' + !!vrm.humanoid);

        // Animate
        const clock = new THREE.Clock();
        const animate = () => {
          requestAnimationFrame(animate);
          vrm.update(clock.getDelta());
          renderer.render(scene, camera);
        };
        animate();
        log('Animation loop started!');
      }
    },
    (progress) => {
      if (progress.total) {
        const pct = Math.round(progress.loaded / progress.total * 100);
        log('Loading: ' + pct + '%');
      }
    },
    (err) => {
      log('ERROR loading VRM: ' + err.message);
      console.error(err);
    }
  );
}

// Render at least the empty scene
renderer.render(scene, camera);
</script>
</body>
</html>
